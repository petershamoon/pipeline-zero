services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: contractflow_test
      POSTGRES_USER: contractflow
      POSTGRES_PASSWORD: testpass
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contractflow -d contractflow_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  azurite-test:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10002:10000"
    command: azurite-blob --blobHost 0.0.0.0
